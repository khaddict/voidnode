server {
    listen 127.0.0.1:8443 ssl proxy_protocol;
    server_name khaddict.com www.khaddict.com website.khaddict.com homepage.khaddict.com images.khaddict.com matomo.khaddict.com;

    ssl_certificate     /etc/letsencrypt/live/khaddict.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/khaddict.com/privkey.pem;

    real_ip_header proxy_protocol;
    set_real_ip_from 127.0.0.1;

    # Force the client to reconnect on every request, so the nginx stream
    # SNI routing (decided once per TCP connection) re-checks HAProxy's
    # health instead of getting stuck on this backend via a kept-alive
    # connection.
    keepalive_timeout 0;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    root /var/www/fallback;

    location / {
        return 503;
    }

    error_page 503 /index.html;
    location = /index.html {
        internal;
    }
}
