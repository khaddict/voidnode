name: Monthly upgrades ticket

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const now = new Date();
            const title = `Upgrades - ${now.toLocaleString("en-US", { month: "long", year: "numeric" })}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ["upgrades"],
            });
