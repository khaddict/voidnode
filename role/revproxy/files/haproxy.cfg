global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    option forwardfor
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h
    timeout client-fin 1m

    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

frontend web_frontend
    bind :80
    bind :443 ssl crt khaddict.com.bundle.pem crt iacine.tech.bundle.pem accept-proxy

    # Force HTTPS
    http-request redirect scheme https unless { ssl_fc }

    # Forward useful headers
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    http-request set-header X-Forwarded-Port 443 if { ssl_fc }
    http-request set-header X-Forwarded-Port 80 unless { ssl_fc }

    # Hosts
    acl host_web       hdr(host) -i khaddict.com www.khaddict.com
    acl host_website   hdr(host) -i website.khaddict.com
    acl host_homepage  hdr(host) -i homepage.khaddict.com
    acl host_images    hdr(host) -i images.khaddict.com
    acl host_matomo    hdr(host) -i matomo.khaddict.com
    acl host_status    hdr(host) -i status.khaddict.com
    acl host_iacine    hdr(host) -i iacine.tech www.iacine.tech

    # Routing
    use_backend backend_web if host_web
    use_backend backend_website if host_website
    use_backend backend_homepage if host_homepage
    use_backend backend_images if host_images
    use_backend backend_matomo if host_matomo
    use_backend backend_status if host_status
    use_backend backend_iacine if host_iacine

    # Default backend
    default_backend backend_web

backend backend_web
    http-request set-header Host www.khaddict.lab
    server web www.khaddict.lab:443 ssl verify none sni str(www.khaddict.lab) check

backend backend_website
    http-request set-header Host website.khaddict.lab
    server website website.khaddict.lab:443 ssl verify none sni str(website.khaddict.lab) check

backend backend_homepage
    http-request set-header Host homepage.khaddict.lab
    server homepage homepage.khaddict.lab:443 ssl verify none sni str(homepage.khaddict.lab) check

backend backend_images
    http-request set-header Host images.khaddict.lab
    server images images.khaddict.lab:443 ssl verify none sni str(images.khaddict.lab) check

backend backend_matomo
    http-request set-header X-Forwarded-Host matomo.khaddict.com
    http-request set-header Host matomo.khaddict.lab
    server matomo matomo.khaddict.lab:80 check

backend backend_status
    http-request set-header X-Forwarded-Host status.khaddict.com
    http-request set-header Host status.khaddict.lab
    http-response set-header Access-Control-Allow-Origin "https://khaddict.com"
    server status status.khaddict.lab:3001 check

backend backend_iacine
    http-request set-header Host iacine-tech.khaddict.lab
    server iacine iacine-tech.khaddict.lab:443 ssl verify none sni str(iacine-tech.khaddict.lab) check
