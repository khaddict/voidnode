apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - argocd.khaddict.lab
  rules:
    - backendRefs:
        - group: '' 
          kind: Service
          name: argocd-server
          port: 80
          weight: 1	
      matches:	
        - path:	
            type: PathPrefix	
            value: /
