version: 1.0
description: Test workflow. Run a highstate on stackstorm.khaddict.lab if needed.

tasks:
  do_nothing:
    action: core.noop
    next:
      - when: <% succeeded() %>
        publish:
          - msg: "Completed successfully."
      - when: <% failed() %>
        publish:
          - msg: "Workflow execution failed."

output:
  - msg: <% ctx().msg %>
