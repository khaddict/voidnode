version: 1.0
description: Decommission a Proxmox VM and clean up its Salt key.

input:
  - name

vars:
  - msg: ""
  - proxmox: "voidnode.khaddict.lab"
  - saltmaster: "saltmaster.khaddict.lab"
  - node: "voidnode"

tasks:
  check_vm_exists:
    action: core.remote
    input:
      hosts: "<% ctx().proxmox %>"
      username: root
      cmd: |
        qm list | grep "<% ctx().name %>"
    next:
      - when: <% succeeded() %>
        publish:
          - vmid: <% result()[ctx().proxmox].stdout.split()[0] %>
        do: check_vm_status
      - when: <% failed() %>
        publish:
          - msg: "VM '<% ctx().name %>' was not found on '<% ctx().proxmox %>'."

  check_vm_status:
    action: core.remote
    input:
      hosts: "<% ctx().proxmox %>"
      username: root
      cmd: |
        qm status <% ctx().vmid %> | awk '{print $2}'
    next:
      - when: <% succeeded() and result()[ctx().proxmox].stdout = "running" %>
        do: stop_vm
      - when: <% succeeded() and result()[ctx().proxmox].stdout = "stopped" %>
        do: delete_vm
      - when: <% failed() %>
        publish:
          - msg: "Failed to determine the power state of VM '<% ctx().name %>' (vmid <% ctx().vmid %>) on '<% ctx().proxmox %>'."

  stop_vm:
    action: core.remote
    input:
      hosts: "<% ctx().proxmox %>"
      username: root
      cmd: |
        qm stop <% ctx().vmid %>
    next:
      - when: <% succeeded() %>
        do: delete_vm
      - when: <% failed() %>
        publish:
          - msg: "Failed to stop VM '<% ctx().name %>' (vmid <% ctx().vmid %>) on '<% ctx().proxmox %>'."

  delete_vm:
    action: core.remote
    input:
      hosts: "<% ctx().proxmox %>"
      username: root
      cmd: |
        qm destroy <% ctx().vmid %>
    next:
      - when: <% succeeded() %>
        do: delete_salt_key
      - when: <% failed() %>
        publish:
          - msg: "Failed to delete VM '<% ctx().name %>' (vmid <% ctx().vmid %>) on '<% ctx().proxmox %>'."

  delete_salt_key:
    action: core.remote
    input:
      hosts: <% ctx().saltmaster %>
      username: root
      cmd: |
        salt-key -d <% ctx().name %> -y
    next:
      - when: <% succeeded() %>
        publish:
          - msg: "VM '<% ctx().name %>' was decommissioned successfully."
      - when: <% failed() %>
        publish:
          - msg: "VM '<% ctx().name %>' was deleted, but its Salt key could not be removed from '<% ctx().saltmaster %>'."

output:
  - msg: <% ctx().msg %>
