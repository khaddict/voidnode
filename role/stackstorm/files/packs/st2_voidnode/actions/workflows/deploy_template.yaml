version: 1.0
description: Deploy a Proxmox VM template from a cloud image.

input:
  - distribution
  - codename
  - osrelease
  - vmid

vars:
  - msg: ""
  - node: "voidnode"
  - debian_url: "https://cloud.debian.org/images/cloud/<% ctx().codename %>/latest/debian-<% ctx().osrelease %>-generic-amd64.qcow2"
  - ubuntu_url: "https://cloud-images.ubuntu.com/<% ctx().codename %>/current/<% ctx().codename %>-server-cloudimg-amd64.img"
  - storage: "local-lvm"
  - memory: "2048"
  - cores: "1"

tasks:
  get_url:
    action: core.noop
    next:
      - when: <% succeeded() %>
        publish:
          - url: <% ctx()[ctx().distribution + '_url'] %>
        do: set_template_name

  set_template_name:
    action: core.noop
    next:
      - when: <% succeeded() %>
        publish:
          - template_name: "<% ctx().distribution %>-<% ctx().codename %>-template"
        do: check_template_exists

  check_template_exists:
    action: core.remote
    input:
      cmd: qm list | grep -i "<% ctx().template_name %>"
      hosts: <% ctx().node %>
      username: root
    next:
      - when: <% succeeded() %>
        do: fail
        publish:
          - msg: "Template '<% ctx().template_name %>' already exists on '<% ctx().node %>'."
      - when: <% failed() %>
        do: download_image

  download_image:
    action: core.remote
    input:
      cmd: wget <% ctx().url %> -O /var/lib/vz/images/<% ctx().template_name %>.img
      hosts: <% ctx().node %>
      username: root
    next:
      - when: <% succeeded() %>
        do: create_vm
      - when: <% failed() %>
        publish:
          - msg: "Failed to download the cloud image for template '<% ctx().template_name %>'."

  create_vm:
    action: core.remote
    input:
      cmd: qm create <% ctx().vmid %> --tags template --serial0 socket --scsi0 <% ctx().storage %>:0,import-from=/var/lib/vz/images/<% ctx().template_name %>.img --scsihw virtio-scsi-single --efidisk0 "<% ctx().storage %>:0" --ide0 "local:cloudinit" --name "<% ctx().template_name %>" --memory <% ctx().memory %> --cores <% ctx().cores %> --net0 virtio,bridge=vmbr0 --onboot 1 --agent 1
      hosts: <% ctx().node %>
      username: root
    next:
      - when: <% succeeded() %>
        do: convert_vm_to_template
      - when: <% failed() %>
        publish:
          - msg: "Failed to create VM '<% ctx().template_name %>' (vmid <% ctx().vmid %>) on '<% ctx().node %>'."

  convert_vm_to_template:
    action: core.remote
    input:
      cmd: qm template <% ctx().vmid %>
      hosts: <% ctx().node %>
      username: root
    next:
      - when: <% succeeded() %>
        publish:
          - msg: "Template '<% ctx().template_name %>' was created successfully on '<% ctx().node %>'."
      - when: <% failed() %>
        publish:
          - msg: "Failed to convert VM '<% ctx().template_name %>' (vmid <% ctx().vmid %>) into a template."

output:
  - url: <% ctx().url %>
  - template_name: <% ctx().template_name %>
  - storage: <% ctx().storage %>
  - memory: <% ctx().memory %>
  - cores: <% ctx().cores %>
  - msg: <% ctx().msg %>
