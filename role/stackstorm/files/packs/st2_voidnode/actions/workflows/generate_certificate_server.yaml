version: 1.0
description: Generate a server certificate, copy it to the VM, and store it in Vault.

input:
  - vm_name

vars:
  - msg: ""
  - domain: "khaddict.lab"
  - fqdn: "<% ctx().vm_name %>.<% ctx().domain %>"
  - easypki_vm: "easypki.<% ctx().domain %>"
  - vault_vm: "vault.<% ctx().domain %>"
  - vm_path: "/root/easypki/pki/intermediates/voidnode/issued/<% ctx().vm_name %>.<% ctx().domain %>"

tasks:
  generate_server_certificate:
    action: core.remote
    input:
      hosts: "<% ctx().easypki_vm %>"
      username: root
      cmd: |
        /usr/bin/bash /root/easypki/easypki.sh cert --pki-dir /root/easypki/pki --ca voidnode --issue-server <% ctx().fqdn %> --san "DNS:<% ctx().fqdn %>" --san "DNS:www.<% ctx().fqdn %>"
    next:
      - when: <% succeeded() %>
        do: copy_certificate_files_to_vm
      - when: <% failed() %>
        publish:
          - msg: "Failed to generate the server certificate for '<% ctx().fqdn %>'."

  copy_certificate_files_to_vm:
    action: core.remote
    input:
      hosts: "<% ctx().easypki_vm %>"
      username: root
      cmd: |
        scp -O <% ctx().vm_path %>/<% ctx().fqdn %>.cert.pem root@<% ctx().fqdn %>:/etc/ssl/certs
        scp -O <% ctx().vm_path %>/<% ctx().fqdn %>.key.pem root@<% ctx().fqdn %>:/etc/ssl/private
    next:
      - when: <% succeeded() %>
        do: read_certificate
      - when: <% failed() %>
        publish:
          - msg: "Failed to copy certificate files for '<% ctx().fqdn %>' to the target VM."

  read_certificate:
    action: core.remote
    input:
      hosts: "<% ctx().easypki_vm %>"
      username: root
      cmd: |
        cat <% ctx().vm_path %>/<% ctx().fqdn %>.cert.pem
    next:
      - when: <% succeeded() %>
        publish:
          - cert: <% result()[ctx().easypki_vm].stdout %>
        do: read_fullchain
      - when: <% failed() %>
        publish:
          - msg: "Failed to read the certificate file for '<% ctx().fqdn %>'."

  read_fullchain:
    action: core.remote
    input:
      hosts: "<% ctx().easypki_vm %>"
      username: root
      cmd: |
        cat <% ctx().vm_path %>/<% ctx().fqdn %>.fullchain.pem
    next:
      - when: <% succeeded() %>
        publish:
          - fullchain: <% result()[ctx().easypki_vm].stdout %>
        do: read_private_key
      - when: <% failed() %>
        publish:
          - msg: "Failed to read the full chain file for '<% ctx().fqdn %>'."

  read_private_key:
    action: core.remote
    input:
      hosts: "<% ctx().easypki_vm %>"
      username: root
      cmd: |
        cat <% ctx().vm_path %>/<% ctx().fqdn %>.key.pem
    next:
      - when: <% succeeded() %>
        publish:
          - key: <% result()[ctx().easypki_vm].stdout %>
        do: store_certificate_in_vault
      - when: <% failed() %>
        publish:
          - msg: "Failed to read the private key file for '<% ctx().fqdn %>'."

  store_certificate_in_vault:
    action: core.remote
    input:
      hosts: "<% ctx().vault_vm %>"
      username: root
      cmd: |
        vault kv put kv/easypki/server/<% ctx().fqdn %> <% ctx().fqdn %>.cert.pem="<% ctx().cert %>" <% ctx().fqdn %>.fullchain.pem="<% ctx().fullchain %>" <% ctx().fqdn %>.key.pem="<% ctx().key %>"
    next:
      - when: <% succeeded() %>
        publish:
          - msg: "Certificate files for '<% ctx().fqdn %>' were generated, copied to the VM, and stored in Vault successfully."
      - when: <% failed() %>
        publish:
          - msg: "Failed to store certificate files for '<% ctx().fqdn %>' in Vault."

output:
  - msg: <% ctx().msg %>
