name: deploy_template
pack: st2_voidnode
runner_type: orquesta
description: Deploy a Proxmox VM template from a cloud image.
enabled: true
entry_point: workflows/deploy_template.yaml

parameters:
  distribution:
    type: string
    required: true
    description: The distribution name, for example 'debian'.
  codename:
    type: string
    required: true
    description: The distribution codename, for example 'bookworm'.
  osrelease:
    type: string
    required: true
    description: The OS release version, for example '12'.
  vmid:
    type: string
    required: true
    description: The template VMID, for example '200'.
