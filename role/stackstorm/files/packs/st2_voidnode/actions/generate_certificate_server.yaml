name: generate_certificate_server
pack: st2_voidnode
runner_type: orquesta
description: Generate a server certificate, optionally deploy it to the target host, and store it in Vault.
entry_point: workflows/generate_certificate_server.yaml
enabled: true
parameters:
  name:
    type: string
    required: true
    description: The VM, application, or service name.
  send_to_vm:
    type: boolean
    required: false
    default: true
    description: Whether to copy the generated certificate and private key to the target host.
