global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.rules

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets:
          - 'localhost:9090'

  - job_name: 'node'
    scrape_interval: 5s
    static_configs:
      - targets:
{%- for hostname, host in node_hosts.items() %}
          - '{{ hostname }}.{{ domain }}:9100'
{%- endfor %}
    relabel_configs:
      - source_labels: [__address__]
        regex: '^([^:]+):[0-9]+$'
        replacement: '$1'
        target_label: instance

  - job_name: 'blackbox_icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    scrape_interval: 5s
    static_configs:
      - targets:
{%- for hostname, host in blackbox_hosts.items() %}
          - '{{ hostname }}.{{ domain }}'
{%- endfor %}
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: prometheus.{{ domain }}:9115
