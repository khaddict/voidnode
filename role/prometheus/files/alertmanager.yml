route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: prometheus_alerts_discord
  routes:
    - receiver: prometheus_muted_alerts_discord
      matchers:
        - alertname="Watchdog"
    - receiver: prometheus_muted_alerts_discord
      matchers:
        - alertname="InfoInhibitor"

inhibit_rules:
  - source_matchers:
      - alertname="InfoInhibitor"
    target_matchers:
      - severity="info"
    equal:
      - namespace

receivers:
- name: prometheus_alerts_discord
  discord_configs:
  - webhook_url: '{{ webhook_url }}'
- name: prometheus_muted_alerts_discord
  discord_configs:
  - webhook_url: '{{ webhook_url_muted }}'
