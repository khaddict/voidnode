network:
  domain: khaddict.lab
  default_iface: &default_iface ens18

  vlans:
    CORE: &vlan_core
      id: 10
      cidr: 10.10.0.0/24
      router: &core_router 10.10.0.1
      gateway: *core_router
      dns: *core_router
      ntp: *core_router

    ADMIN: &vlan_admin
      id: 20
      cidr: 10.20.0.0/24
      router: &admin_router 10.20.0.1
      gateway: *admin_router
      dns: *admin_router
      ntp: *admin_router

    INFRA: &vlan_infra
      id: 30
      cidr: 10.30.0.0/24
      router: &infra_router 10.30.0.1
      gateway: *infra_router
      dns: *infra_router
      ntp: *infra_router

    EDGE: &vlan_edge
      id: 40
      cidr: 10.40.0.0/24
      router: &edge_router 10.40.0.1
      gateway: *edge_router
      dns: *edge_router
      ntp: *edge_router

proxmox:
  backups:
    storage: pbs

  nodes:
    voidnode:
      ip: 10.10.0.2
      main_iface: vmbr1.10@vmbr1
      ssh: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINE01B4TmU98iq6UtE2NfnfG5GHE4SaLpNBj/H36+dXw voidnode@khaddict.lab"
      hardware:
        ram_mb: 123904
        cpu:
          sockets: 1
          cores: 12
          threads_per_core: 2
        disks:
          - name: nvme0n1
            size_gb: 4000
            type: nvme
      <<: *vlan_core

  vms:
    # VLAN CORE
    opnsense:
      vmid: 100
      description: "OPNsense Firewall/Router"
      template: null
      tags: "core"
      ip: 10.10.0.1
      main_iface: null
      ssh: null
      hardware:
        ram_mb: 4096
        cpu:
          sockets: 1
          cores: 4
        disks:
          - name: scsi0
            size_gb: 32
      <<: *vlan_core

    # VLAN ADMIN
    assets:
      vmid: 101
      description: "Asset Management System"
      template: debian-trixie-template
      tags: "admin,trixie"
      ip: 10.20.0.2
      main_iface: *default_iface
      ssh: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAnR2TSVsFOLrw7lNG25G+HX8y7XktC6bqZs0RCfyi4V assets@khaddict.lab"
      hardware:
        ram_mb: 2048
        cpu:
          sockets: 1
          cores: 2
        disks:
          - name: scsi0
            size_gb: 20
      <<: *vlan_admin

    saltmaster:
