      <script>
        const STATUS = 'https://status.khaddict.com';
        const SLUG   = 'khaddict';
    
        const dot      = document.getElementById('s-dot');
        const dropdown = document.getElementById('s-dropdown');
        const inner    = document.getElementById('s-inner');
        const btn      = document.getElementById('status-btn');
    
        async function loadStatus() {
          try {
            const [pageRes, hbRes] = await Promise.all([
              fetch(`${STATUS}/api/status-page/${SLUG}`),
              fetch(`${STATUS}/api/status-page/heartbeat/${SLUG}`)
            ]);
            if (!pageRes.ok || !hbRes.ok) throw new Error();
    
            const page = await pageRes.json();
            const hb   = await hbRes.json();
            const monitors = page.publicGroupList.flatMap(g => g.monitorList);
            let up = 0;
    
            inner.innerHTML = '';
            monitors.forEach(m => {
              const beats = hb.heartbeatList[m.id] || [];
              const last  = beats[beats.length - 1];
              const isUp  = last?.status === 1;
              if (isUp) up++;
    
              const pct24 = hb.uptimeList[`${m.id}_24`];
              const p = pct24 !== undefined ? `${(pct24 * 100).toFixed(1)}%` : '—';
    
              const recent = beats.slice(-30);
              const bars = recent.map(b => {
                const state = b.status === 1 ? 'up' : b.status === 0 ? 'down' : b.status === 2 ? 'pending' : '';
                return `<span class="heartbeat-bar ${state}"></span>`;
              }).join('');
    
              const el = document.createElement('div');
              el.className = 'dropdown-line';
              el.innerHTML = `
                <div class="dropdown-line-top">
                  <span class="dot ${isUp ? 'up' : 'down'}"></span>
                  <span class="dropdown-name">${m.name}</span>
                  <span>${p}</span>
                </div>
                <div class="heartbeat">${bars}</div>
              `;
              inner.appendChild(el);
            });
    
            const link = document.createElement('a');
            link.href = STATUS;
            link.target = '_blank';
            link.rel = 'noopener';
            link.className = 'dropdown-more';
            link.textContent = 'view full status ↗';
            inner.appendChild(link);
    
            const total = monitors.length;
            dot.className = `dot ${up === total ? 'up' : up === 0 ? 'down' : ''}`;
    
          } catch {
            inner.innerHTML = '<div class="dropdown-line">could not reach status page</div>';
          }
        }
    
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
          if (!dropdown.contains(e.target) && e.target !== btn) dropdown.classList.remove('open');
        });
    
        loadStatus();
    
    
        document.getElementById('theme-toggle').addEventListener('click', () => {
          const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
          document.documentElement.dataset.theme = next;
          setThemeCookie(next);
        });
    
        (function () {
          const discordBtn = document.getElementById('discord-btn');
          const discordToast = document.getElementById('discord-toast');
          let toastTimer = null;
    
          discordBtn.addEventListener('click', async () => {
            try { await navigator.clipboard.writeText('khaddict'); } catch { /* clipboard unavailable */ }
            discordBtn.classList.add('copied');
            discordToast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
              discordToast.classList.remove('show');
              discordBtn.classList.remove('copied');
            }, 900);
          });
        })();
    
        // deploy gag, relocated verbatim from blog.khaddict.com, scoped so its
        // identifiers (btn, log, deploy...) never collide with the rest of the page.
        (function () {
          const deployBtn = document.getElementById('deploy-btn');
          const deployLog = document.getElementById('deploy-log');
          const RICK = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
          let fired = false;
          let parrotInterval = null;
          let cancelHandler = null;
          let stopParrot = null;
    
          function line(text, cls, delay) {
            setTimeout(() => {
              const nearBottom = deployLog.scrollHeight - deployLog.scrollTop - deployLog.clientHeight < 40;
              const d = document.createElement('div');
              if (cls) d.className = cls;
              d.textContent = text;
              deployLog.appendChild(d);
              if (nearBottom) deployLog.scrollTop = deployLog.scrollHeight;
            }, delay);
          }
    
          function deploy() {
            if (fired) return;
            fired = true;
    
            const now = new Date();
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const mons = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const pad  = n => String(n).padStart(2, '0');
            const H = pad(now.getHours()), M = pad(now.getMinutes()), S = pad(now.getSeconds());
            const Y = now.getFullYear(), mo = pad(now.getMonth() + 1), d = pad(now.getDate());
            const tz  = now.toLocaleTimeString('en', {timeZoneName: 'short'}).split(' ').pop();
            const ts  = `${days[now.getDay()]} ${Y}-${mo}-${d} ${H}:${M}:${S} ${tz}`;
            const jts = `${mons[now.getMonth()]} ${d} ${H}:${M}:${S}`;
            const inv = Array.from({length: 32}, () => Math.floor(Math.random() * 16).toString(16)).join('');
    
            deployBtn.disabled = true;
            deployBtn.classList.add('deploying');
            deployBtn.innerHTML = '<div class="deploy-spinner"></div>Deploying...';
            deployLog.classList.add('open');
    
            const steps = [
              ['$ apt update', 'la', 0],
