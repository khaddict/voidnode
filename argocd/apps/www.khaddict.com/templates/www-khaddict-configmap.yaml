              ['Processing triggers for libc-bin (2.36-9+deb12u9) ...', 'lm', 8560],
    
              ['$ apt install -y nginx', 'la', 9060],
              ['Reading package lists... Done', 'lm', 9410],
              ['Building dependency tree... Done', 'lm', 9710],
              ['The following NEW packages will be installed: nginx nginx-common', 'lm', 9860],
              ['0 upgraded, 2 newly installed, 0 to remove.', 'lm', 9980],
              ['Need to get 613 kB of archives.', 'lm', 10130],
              ['Get:1 .../nginx-common_1.24.0-2+deb12u3_all.deb [113 kB]', 'lm', 10330],
              ['Get:2 .../nginx_1.24.0-2+deb12u3_amd64.deb [500 kB]', 'lm', 10780],
              ['Fetched 613 kB in 0s (1,842 kB/s)', 'lm', 10930],
              ['Unpacking nginx-common (1.24.0-2+deb12u3) ...', 'lm', 11180],
              ['Unpacking nginx (1.24.0-2+deb12u3) ...', 'lm', 11430],
              ['Setting up nginx (1.24.0-2+deb12u3) ...', 'lm', 11780],
              ['Processing triggers for systemd (252.26-1~deb12u2) ...', 'lm', 12080],
    
              ['', '', 12580],
              ['$ cp /tmp/blog-khaddict.conf /etc/nginx/sites-available/blog-khaddict.conf', 'la', 12880],
              ['$ ln -s /etc/nginx/sites-available/blog-khaddict.conf /etc/nginx/sites-enabled/blog-khaddict.conf', 'la', 13380],
    
              ['$ nginx -t', 'la', 13780],
              ['nginx: the configuration file /etc/nginx/nginx.conf syntax is ok', 'lg', 14030],
              ['nginx: configuration file /etc/nginx/nginx.conf test is successful', 'lg', 14030],
              ['', '', 14230],
    
              ['$ systemctl restart nginx', 'la', 14530],
    
              ['$ systemctl status nginx', 'la', 15130],
              ['● nginx.service - A high performance web server and a reverse proxy server', 'lm', 15330],
              ['     Loaded: loaded (/usr/lib/systemd/system/nginx.service; enabled; preset: enabled)', 'lm', 15330],
              [`     Active: active (running) since ${ts}; 1s ago`, 'lg', 15330],
              [` Invocation: ${inv}`, 'lm', 15330],
              ['       Docs: man:nginx(8)', 'lm', 15330],
              ['    Process: 294512 ExecStartPre=/usr/sbin/nginx -t -q (code=exited, status=0/SUCCESS)', 'lm', 15330],
              ['    Process: 294514 ExecStart=/usr/sbin/nginx -g daemon on; (code=exited, status=0/SUCCESS)', 'lm', 15330],
              ['   Main PID: 294542 (nginx)', 'lm', 15330],
              ['      Tasks: 3 (limit: 4655)', 'lm', 15330],
              ['     Memory: 2.9M (peak: 7.2M)', 'lm', 15330],
