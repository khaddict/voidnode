        .dot {
          width: 6px; height: 6px;
          border-radius: 50%;
          background: var(--muted);
          flex-shrink: 0;
          transition: background .3s ease;
        }
        .dot.up   { background: var(--up); box-shadow: 0 0 0 0 rgba(22, 163, 74, .35); animation: pulse 2.5s infinite; }
        .dot.down { background: var(--down); }
    
        .bandeau-right {
          display: flex;
          align-items: center;
          gap: 1.1rem;
        }
    
        .status-nav { position: relative; }
    
        .status-nav::after {
          content: '';
          position: absolute;
          top: 100%;
          right: 0;
          width: 340px;
          height: .9rem;
        }
    
        .dropdown {
          position: absolute;
          top: calc(100% + .9rem);
          right: 0;
          width: 340px;
          background: var(--surface);
          border: 1px solid var(--border);
