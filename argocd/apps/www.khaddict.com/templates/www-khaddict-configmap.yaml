          font-family: 'JetBrains Mono', monospace;
          font-size: .8rem;
          color: var(--muted);
          text-decoration: none;
          transition: color .15s ease;
        }
        .repo-link:hover { color: var(--accent); }
        .repo-link svg { width: 14px; height: 14px; }
    
        /* deploy gag, relocated from the now-retired blog.khaddict.com */
        .deploy-panel {
          position: relative;
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.1rem;
          padding: 1.75rem 2rem;
          border-radius: 16px;
          background: var(--surface);
          border: 1px solid var(--border);
          box-shadow: 0 20px 50px var(--shadow);
          flex: 1 1 620px;
          max-width: 720px;
          width: 100%;
          overflow: hidden;
          transition: background-color .2s ease, border-color .2s ease;
        }
    
        .deploy-panel::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0; height: 1px;
          background: linear-gradient(90deg, transparent, var(--down), transparent);
        }
    
        .deploy-panel::after {
          content: '';
          position: absolute; inset: 0;
          background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--danger-dim), transparent 70%);
          pointer-events: none;
        }
    
        .deploy-label {
          position: relative;
          font-family: 'JetBrains Mono', monospace;
          font-size: .68rem;
          font-weight: 600;
          color: var(--down);
          letter-spacing: .14em;
          text-transform: uppercase;
          opacity: .85;
        }
    
        .deploy-title { position: relative; font-size: 1.02rem; font-weight: 700; line-height: 1.5; }
        .deploy-title strong { color: var(--down); font-weight: 800; }
    
        .deploy-sub {
          position: relative;
          font-size: .78rem;
          color: var(--muted);
          line-height: 1.6;
          max-width: 620px;
          white-space: nowrap;
        }
    
        @media (max-width: 940px) {
          .deploy-panel { flex: none; }
          .deploy-sub { white-space: normal; max-width: 420px; }
        }
    
        .deploy-btn {
          position: relative;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: .5rem;
          padding: .6rem 1.4rem;
          border-radius: 10px;
          border: 1px solid rgba(239, 68, 68, .35);
          background: rgba(239, 68, 68, .08);
          color: var(--down);
          font-family: 'JetBrains Mono', monospace;
          font-size: .82rem;
          font-weight: 600;
          letter-spacing: .03em;
          cursor: pointer;
          transition: background .2s, border-color .2s, box-shadow .2s, transform .15s cubic-bezier(.34, 1.56, .64, 1);
        }
    
        .deploy-btn:hover:not(:disabled) {
          background: rgba(239, 68, 68, .16);
          border-color: rgba(239, 68, 68, .65);
          box-shadow: 0 0 24px rgba(239, 68, 68, .2);
          transform: translateY(-3px);
        }
    
        .deploy-btn.deploying {
          cursor: not-allowed;
          transform: none;
          animation: deploy-progress 16.85s linear forwards;
        }
    
        @keyframes deploy-progress {
          0%   { background: rgba(239, 68, 68, .10); border-color: rgba(239, 68, 68, .4);  color: #ef4444; }
          100% { background: rgba(34, 197, 94, .10); border-color: rgba(34, 197, 94, .45); color: #22c55e; }
        }
    
        .deploy-btn:disabled { opacity: .75; }
    
        .deploy-spinner {
          width: 13px; height: 13px;
          border: 2px solid var(--border);
          border-top-color: currentColor;
          border-radius: 50%;
          animation: spin .7s linear infinite;
        }
    
        #deploy-log {
          position: relative;
          display: none;
          width: calc(100% + 4rem);
          margin: .5rem -2rem -1.75rem;
          padding: .85rem 1.5rem 1.1rem;
          background: #0a0a0f;
          border-top: 1px solid var(--border);
          font-family: 'JetBrains Mono', monospace;
          font-size: .72rem;
          line-height: 1.8;
          text-align: left;
          white-space: pre-wrap;
          overflow-y: auto;
          overflow-x: hidden;
          user-select: none;
        }
    
        #deploy-log.open { display: flex; flex-direction: column; height: min(300px, 40dvh); }
    
        #deploy-log .la { color: var(--accent); }
        #deploy-log .lg { color: #4ade80; }
        #deploy-log .lm { color: #8a8a96; }
    
        #deploy-log::-webkit-scrollbar { width: 3px; }
        #deploy-log::-webkit-scrollbar-track { background: transparent; }
        #deploy-log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, .12); border-radius: 2px; }
        #deploy-log::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, .22); }
    
        @keyframes spin { to { transform: rotate(360deg); } }
    
        @keyframes fade-up {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%   { box-shadow: 0 0 0 0   rgba(22, 163, 74, .4); }
          70%  { box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
          100% { box-shadow: 0 0 0 0   rgba(22, 163, 74, 0); }
        }
    
        @media (max-width: 460px) {
          .bandeau-inner { justify-content: center; text-align: center; }
          .topnav { justify-content: center; gap: 1rem; }
          .footer-links { position: static; align-self: center; margin: 2rem 0 1.5rem; }
          .status-nav { position: static; }
          .dropdown { left: 50%; right: auto; width: min(340px, calc(100vw - 2rem)); transform: translateX(-50%) translateY(-6px); }
          .dropdown.open, .status-nav:hover .dropdown { transform: translateX(-50%) translateY(0); }
        }
    
        @media (prefers-reduced-motion: reduce) {
          *, *::before, *::after {
            animation-duration: .001ms !important;
            transition-duration: .001ms !important;
          }
        }
      </style>
    </head>
    
