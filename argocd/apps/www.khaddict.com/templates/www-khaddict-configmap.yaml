              ['$ dig +short TXT khaddict.com', 'la', 16050],
              ['"hello curious diggers, nothing to see here"', 'lm', 16350],
            ];
    
            steps.forEach(([t, c, d]) => line(t, c, d));
    
            setTimeout(() => {
              const nearBottom0 = deployLog.scrollHeight - deployLog.scrollTop - deployLog.clientHeight < 40;
              const cmdLine = document.createElement('div');
              cmdLine.innerHTML = '<span class="la">$ curl parrot.live</span><span class="lm">  # ^C or tap to stop</span>';
              deployLog.appendChild(cmdLine);
              if (nearBottom0) deployLog.scrollTop = deployLog.scrollHeight;
    
              setTimeout(() => {
                const wrap = document.createElement('div');
