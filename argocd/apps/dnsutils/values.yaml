app: dnsutils
namespace: tools

deployment:
  replicas: 1
  image: registry.k8s.io/e2e-test-images/agnhost:2.56
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

probes:
  enabled: false
  liveness:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
