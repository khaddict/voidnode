apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  STRIKE_API_TOKEN: {{ .Values.env.STRIKE_API_TOKEN }}
  STREAMLIT_SERVER_HEADLESS: {{ .Values.env.STREAMLIT_SERVER_HEADLESS | quote }}
  STREAMLIT_SERVER_PORT: {{ .Values.env.STREAMLIT_SERVER_PORT | quote }}
  STREAMLIT_SERVER_ADDRESS: {{ .Values.env.STREAMLIT_SERVER_ADDRESS | quote }}
  STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: {{ .Values.env.STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION | quote }}
  STREAMLIT_CLIENT_LOGGER_LEVEL: {{ .Values.env.STREAMLIT_CLIENT_LOGGER_LEVEL | quote }}
  STREAMLIT_SERVER_MAX_MESSAGE_SIZE: {{ .Values.env.STREAMLIT_SERVER_MAX_MESSAGE_SIZE | quote }}
