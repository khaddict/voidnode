app: website-khaddict
namespace: website-khaddict

deployment:
  name: website-khaddict
  replicas: 3
  image: nginx:1.31.2
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  name: website-khaddict
  type: ClusterIP
  port: 80
  targetPort: 80

probes:
  enabled: true
  liveness:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5

secret:
  name: website-khaddict

httproute:
  host: website.khaddict.lab
  gatewayName: envoy-gateway
