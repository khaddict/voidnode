{{- range $site := .Values.sites }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ $site.name }}-khaddict
  namespace: {{ $.Values.namespace }}
spec:
  parentRefs:
    - name: {{ $.Values.httproute.gatewayName }}
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "{{ $site.host }}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $site.name }}-khaddict
          port: {{ $.Values.service.port }}
          group: ''
          kind: Service
          weight: 1
{{- end }}
