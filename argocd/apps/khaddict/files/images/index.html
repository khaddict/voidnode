  <script>
    function getThemeCookie() {
      try {
        var match = document.cookie.match(/(?:^|; )khaddict-theme=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : null;
      } catch (e) { return null; }
    }
    function setThemeCookie(value) {
      try {
        document.cookie = 'khaddict-theme=' + encodeURIComponent(value) + '; domain=.khaddict.com; path=/; max-age=31536000; SameSite=Lax; Secure';
      } catch (e) { /* cookies unavailable */ }
    }
    (function () {
      var stored = getThemeCookie();
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
      if (!stored) setThemeCookie(theme);
    })();
  </script>

  <style>
    :root {
      --bg:                 #ffffff;
      --text:               #18181b;
      --muted:              #71717a;
      --border:             rgba(24, 24, 27, .09);
      --accent:             #8b5cf6;
      --accent-2:           #c026d3;
      --up:                 #16a34a;
      --down:               #dc2626;
      --surface:            #ffffff;
      --surface-translucent: rgba(255, 255, 255, .5);
      --shadow:             rgba(24, 24, 27, .12);
      --blob-1:             rgba(139, 92, 246, .32);
      --blob-2:             rgba(192, 71, 219, .24);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:                  #1a1a22;
        --text:                #f1f5f9;
        --muted:               #94949f;
        --border:              rgba(255, 255, 255, .1);
        --accent:              #a78bfa;
        --accent-2:            #e879f9;
        --up:                  #4ade80;
        --down:                #f87171;
        --surface:             #22222c;
        --surface-translucent: rgba(26, 26, 34, .5);
        --shadow:              rgba(0, 0, 0, .5);
        --blob-1:              rgba(139, 92, 246, .22);
        --blob-2:              rgba(192, 71, 219, .18);
      }
    }

    :root[data-theme="light"] {
      --bg: #ffffff; --text: #18181b; --muted: #71717a; --border: rgba(24, 24, 27, .09);
      --accent: #8b5cf6; --accent-2: #c026d3; --up: #16a34a; --down: #dc2626;
      --surface: #ffffff; --surface-translucent: rgba(255, 255, 255, .5); --shadow: rgba(24, 24, 27, .12);
      --blob-1: rgba(139, 92, 246, .32); --blob-2: rgba(192, 71, 219, .24);
    }

    :root[data-theme="dark"] {
      --bg: #1a1a22; --text: #f1f5f9; --muted: #94949f; --border: rgba(255, 255, 255, .1);
      --accent: #a78bfa; --accent-2: #e879f9; --up: #4ade80; --down: #f87171;
      --surface: #22222c; --surface-translucent: rgba(26, 26, 34, .5); --shadow: rgba(0, 0, 0, .5);
      --blob-1: rgba(139, 92, 246, .22); --blob-2: rgba(192, 71, 219, .18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(620px circle at 12% -8%, var(--blob-1), transparent 60%),
        radial-gradient(520px circle at 100% 8%, var(--blob-2), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      transition: background-color .2s ease, color .2s ease;
    }

    /* top bar */
    .bandeau {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--border);
      background: var(--surface-translucent);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      transition: background-color .2s ease, border-color .2s ease;
    }

    .bandeau-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: .85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .5rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: .92rem;
    }

    .brand-icon { width: 38px; height: 38px; border-radius: 8px; }

    .topnav {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      flex-wrap: wrap;
    }

    .topnav a, .topnav button, .status-nav button {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      color: var(--muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: color .15s ease;
      padding: 0;
    }
    .topnav a:hover, .topnav button:hover, .status-nav button:hover,
    .topnav a:focus-visible, .topnav button:focus-visible, .status-nav button:focus-visible { color: var(--accent); }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s ease;
    }
    .dot.up   { background: var(--up); box-shadow: 0 0 0 0 rgba(22, 163, 74, .35); animation: pulse 2.5s infinite; }
    .dot.down { background: var(--down); }

    .bandeau-right {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .status-nav { position: relative; }

    .status-nav::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 0;
      width: 340px;
      height: .9rem;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + .9rem);
      right: 0;
      width: fit-content;
      min-width: 260px;
      max-width: min(340px, calc(100vw - 2rem));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: .7rem .8rem .8rem;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .dropdown.open,
    .status-nav:hover .dropdown { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .dropdown-line {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      padding: .45rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .dropdown-line.dropdown-msg { text-align: center; }
    .dropdown-line + .dropdown-line { border-top: 1px solid var(--border); }

    .dropdown-line-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: var(--muted);
    }
    .dropdown-name { flex: 1; color: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

    .heartbeat {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .heartbeat-bar {
      flex: none;
      width: 4px;
      height: 100%;
      border-radius: 1px;
      background: var(--muted);
      opacity: .35;
    }
    .heartbeat-bar.up   { background: var(--up); opacity: 1; }
    .heartbeat-bar.down { background: var(--down); opacity: 1; }
    .heartbeat-bar.pending { background: #fbbf24; opacity: 1; }

    .dropdown-more {
      display: block;
      margin-top: .4rem;
      font-size: .74rem;
      color: var(--accent);
      text-decoration: none;
    }

    .footer-links {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      z-index: 15;
      display: flex;
      gap: .5rem;
    }

    .icon-link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
      flex-shrink: 0;
    }
    .icon-link:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, .08); }
    .icon-link svg { width: 16px; height: 16px; }

    .copy-toast {
      position: absolute;
      bottom: calc(100% + .5rem);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: .35rem .65rem;
      border-radius: 6px;
      box-shadow: 0 8px 20px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hover-hint {
      position: absolute;
      bottom: calc(100% + .5rem);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: .3rem .6rem;
      border-radius: 6px;
      box-shadow: 0 8px 20px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
    }
    .icon-link:hover .hover-hint { opacity: 1; transform: translateX(-50%) translateY(0); }
    .icon-link.copied .hover-hint { opacity: 0 !important; }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, .08); }
    .theme-toggle svg { width: 15px; height: 15px; }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

    .lang-nav { position: relative; }

    .lang-btn {
      display: flex;
      align-items: center;
      gap: .3rem;
      height: 30px;
      padding: 0 .6rem;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      font-weight: 600;
      flex-shrink: 0;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .lang-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, .08); }
    .lang-btn svg { width: 10px; height: 10px; }

    .lang-dropdown {
      position: absolute;
      top: calc(100% + .6rem);
      right: 0;
      min-width: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: .4rem;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .lang-dropdown.open { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .lang-option {
      display: flex;
      align-items: center;
      gap: .55rem;
      width: 100%;
      text-align: left;
      padding: .45rem .6rem;
      border-radius: 6px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }
    .lang-option:hover { background: rgba(139, 92, 246, .08); color: var(--accent); }
    .lang-flag { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; display: block; }
    .lang-option.active { color: var(--accent); font-weight: 600; }

    /* gallery tree */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      gap: 2.5rem;
    }

    .gallery-wrap {
      width: 100%;
      max-width: 1040px;
      display: flex;
      flex-direction: column;
      gap: 2.75rem;
      animation: fade-up .45s .08s ease both;
    }

    .tabs {
      display: flex;
      gap: 1.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.6rem;
    }

    .tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: .1rem .1rem .75rem;
      margin-bottom: -1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .45rem;
      transition: color .15s ease, border-color .15s ease;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-count {
      font-size: .68rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--border);
      padding: .05rem .45rem;
      border-radius: 20px;
    }
    .tab.active .tab-count { color: var(--accent); }

    .tab-panel { display: none; animation: fade-up .3s ease both; }
    .tab-panel.active { display: block; }

    .dock {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: flex-start;
      gap: 1rem;
      padding: 1.5rem 1rem 2.5rem;
    }

    .dock-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 58px;
      height: 58px;
      flex-shrink: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 2px 6px var(--shadow);
      cursor: pointer;
      text-decoration: none;
      transform-origin: bottom center;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .dock-item img {
      width: 100%;
      height: 100%;
      display: block;
    }
    .dock-item:hover {
      transform: scale(1.7);
      border-color: var(--accent);
      box-shadow: 0 10px 24px var(--shadow);
      z-index: 5;
    }

    .dock-tooltip {
      position: absolute;
      bottom: calc(100% + .6rem);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: .3rem .6rem;
      border-radius: 6px;
      box-shadow: 0 8px 20px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
      z-index: 5;
    }
    .dock-item:hover .dock-tooltip { opacity: 1; transform: translateX(-50%) translateY(0); }

    .dock-size {
      position: absolute;
      bottom: 2px;
      right: 2px;
      font-family: 'JetBrains Mono', monospace;
      font-size: .56rem;
      color: #f8fafc;
      background: rgba(0, 0, 0, .55);
      padding: .05rem .3rem;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .15s ease;
    }
    .dock-item:hover .dock-size { opacity: 1; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 1.1rem;
    }

    .gallery-card {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      text-decoration: none;
      color: inherit;
      position: relative;
      z-index: 1;
    }
    .gallery-card:hover { z-index: 2; }

    .gallery-thumb {
      position: relative;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 1px 2px var(--shadow);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }
    .gallery-card:hover .gallery-thumb {
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 22px 44px var(--shadow);
      border-color: var(--accent);
    }
    .gallery-card:hover .gallery-thumb img { transform: scale(1.15); }

    .gallery-size {
      position: absolute;
      bottom: .4rem;
      right: .4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .62rem;
      color: #f8fafc;
      background: rgba(0, 0, 0, .55);
      padding: .12rem .45rem;
      border-radius: 5px;
      opacity: 0;
      transform: translateY(3px);
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(4px);
    }
    .gallery-card:hover .gallery-size { opacity: 1; transform: translateY(0); }

    .dir-empty {
      font-family: 'JetBrains Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      padding: .4rem .4rem;
      font-style: italic;
    }

    /* lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 8, 12, .82);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      padding: 2rem;
    }
    .lightbox.open { opacity: 1; pointer-events: auto; }

    .lightbox-img {
      max-width: min(90vw, 1100px);
      max-height: 82vh;
      border-radius: 12px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .5);
      transform: scale(.96);
      transition: transform .2s ease;
    }
    .lightbox.open .lightbox-img { transform: scale(1); }

    .lightbox-toolbar {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: .75rem;
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .15);
      padding: .45rem .6rem .45rem 1rem;
      border-radius: 20px;
      backdrop-filter: blur(6px);
      max-width: calc(100vw - 2rem);
    }

    .lightbox-caption {
      font-family: 'JetBrains Mono', monospace;
      font-size: .78rem;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lightbox-actions { display: flex; gap: .35rem; flex-shrink: 0; }

    .lightbox-action-btn {
      position: relative;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .06);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s ease;
    }
    .lightbox-action-btn:hover { background: rgba(255, 255, 255, .18); }
    .lightbox-action-btn svg { width: 15px; height: 15px; }

    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.5rem;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .06);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s ease;
    }
    .lightbox-close:hover { background: rgba(255, 255, 255, .16); }
    .lightbox-close svg { width: 18px; height: 18px; }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .06);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s ease;
    }
    .lightbox-nav:hover { background: rgba(255, 255, 255, .16); }
    .lightbox-nav svg { width: 20px; height: 20px; }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    @media (max-width: 640px) {
      .lightbox-nav { width: 36px; height: 36px; }
      .lightbox-prev { left: .5rem; }
      .lightbox-next { right: .5rem; }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(22, 163, 74, .4); }
      70%  { box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
      100% { box-shadow: 0 0 0 0   rgba(22, 163, 74, 0); }
    }

    @media (max-width: 460px) {
      .bandeau-inner { justify-content: center; text-align: center; }
      .topnav { justify-content: center; gap: 1rem; }
      .footer-links { position: static; align-self: center; margin: 2rem 0 1.5rem; }
      .status-nav { position: static; }
      .dropdown { left: 50%; right: auto; width: min(340px, calc(100vw - 2rem)); transform: translateX(-50%) translateY(-6px); }
      .dropdown.open, .status-nav:hover .dropdown { transform: translateX(-50%) translateY(0); }
      .lang-nav { position: static; }
      .lang-dropdown { left: 50%; right: auto; transform: translateX(-50%) translateY(-6px); }
      .lang-dropdown.open { transform: translateX(-50%) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

  <script>
    const I18N = {
      en: {
        'nav.home': 'home',
        'status.label': 'status',
        'status.checking': 'checking systems…',
        'status.viewFull': 'view full status ↗',
        'status.unreachable': 'could not reach status page',

        'tabs.gallery': 'gallery',
        'dir.empty': '(empty)',
        'dir.failed': 'Failed to load directory listing.',
        'lightbox.prev': 'Previous image',
        'lightbox.next': 'Next image',
        'lightbox.close': 'Close',
        'lightbox.download': 'Download',
        'lightbox.copyLink': 'Copy link',
        'lightbox.copyImage': 'Copy image',
        'discord.hint': 'copy username',
        'discord.toast': 'copied',
        'discord.ariaLabel': 'Copy Discord username',
        'theme.ariaLabel': 'Toggle theme',
        'lang.ariaLabel': 'Switch language',
      },
      fr: {
        'nav.home': 'accueil',
        'status.label': 'statut',
        'status.checking': 'vérification des systèmes…',
        'status.viewFull': 'voir le statut complet ↗',
        'status.unreachable': 'page de statut injoignable',
        'tabs.icons': 'icônes',
        'tabs.gallery': 'galerie',
        'dir.empty': '(vide)',
        'dir.failed': 'Échec du chargement du dossier.',
        'lightbox.prev': 'Image précédente',
        'lightbox.next': 'Image suivante',
        'lightbox.close': 'Fermer',
        'lightbox.download': 'Télécharger',
        'lightbox.copyLink': 'Copier le lien',
        'lightbox.copyImage': "Copier l'image",
        'discord.hint': 'copier pseudo',
        'discord.toast': 'copié',
        'discord.ariaLabel': 'Copier le pseudo Discord',
        'theme.ariaLabel': 'Changer le thème',
        'lang.ariaLabel': 'Changer de langue',
      },
    };

    function getLangCookie() {
      try {
        var match = document.cookie.match(/(?:^|; )khaddict-lang=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : null;
      } catch (e) { return null; }
    }
    function setLangCookie(value) {
      try {
        document.cookie = 'khaddict-lang=' + encodeURIComponent(value) + '; domain=.khaddict.com; path=/; max-age=31536000; SameSite=Lax; Secure';
      } catch (e) { /* cookies unavailable */ }
    }

    let currentLang = getLangCookie() || 'en';

    function t(key) {
      return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang;
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        el.innerHTML = t(el.getAttribute('data-i18n'));
      });
      document.querySelectorAll('[data-i18n-aria]').forEach((el) => {
        el.setAttribute('aria-label', t(el.getAttribute('data-i18n-aria')));
      });
      document.getElementById('lang-current').textContent = currentLang.toUpperCase();
      document.querySelectorAll('.lang-option').forEach((el) => {
        el.classList.toggle('active', el.getAttribute('data-lang') === currentLang);
      });
    }

    applyLanguage();

    const langBtn = document.getElementById('lang-btn');
    const langDropdown = document.getElementById('lang-dropdown');

    langBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      langDropdown.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!langDropdown.contains(e.target) && e.target !== langBtn) langDropdown.classList.remove('open');
    });
    document.querySelectorAll('.lang-option').forEach((el) => {
      el.addEventListener('click', () => {
        currentLang = el.getAttribute('data-lang');
        setLangCookie(currentLang);
        applyLanguage();
        langDropdown.classList.remove('open');
      });
    });

    const STATUS = 'https://status.khaddict.com';
    const SLUG   = 'khaddict';

    const dot      = document.getElementById('s-dot');
    const dropdown = document.getElementById('s-dropdown');
    const inner    = document.getElementById('s-inner');
    const btn      = document.getElementById('status-btn');

    async function loadStatus() {
      try {
        const [pageRes, hbRes] = await Promise.all([
          fetch(`${STATUS}/api/status-page/${SLUG}`),
          fetch(`${STATUS}/api/status-page/heartbeat/${SLUG}`)
        ]);
        if (!pageRes.ok || !hbRes.ok) throw new Error();

        const page = await pageRes.json();
        const hb   = await hbRes.json();
        const monitors = page.publicGroupList.flatMap(g => g.monitorList);
        let up = 0;

        inner.innerHTML = '';
        monitors.forEach(m => {
          const beats = hb.heartbeatList[m.id] || [];
          const last  = beats[beats.length - 1];
          const isUp  = last?.status === 1;
          if (isUp) up++;

          const pct24 = hb.uptimeList[`${m.id}_24`];
          const p = pct24 !== undefined ? `${(pct24 * 100).toFixed(1)}%` : '—';

          const recent = beats.slice(-30);
          const bars = recent.map(b => {
            const state = b.status === 1 ? 'up' : b.status === 0 ? 'down' : b.status === 2 ? 'pending' : '';
            return `<span class="heartbeat-bar ${state}"></span>`;
          }).join('');

          const el = document.createElement('div');
          el.className = 'dropdown-line';
          el.innerHTML = `
            <div class="dropdown-line-top">
              <span class="dot ${isUp ? 'up' : 'down'}"></span>
              <span class="dropdown-name">${m.name}</span>
              <span>${p}</span>
            </div>
            <div class="heartbeat">${bars}</div>
          `;
          inner.appendChild(el);
        });

        const link = document.createElement('a');
        link.href = STATUS;
        link.target = '_blank';
        link.rel = 'noopener';
        link.className = 'dropdown-more';
        link.textContent = t('status.viewFull');
        inner.appendChild(link);

        const total = monitors.length;
        dot.className = `dot ${up === total ? 'up' : up === 0 ? 'down' : ''}`;

      } catch {
        inner.innerHTML = `<div class="dropdown-line dropdown-msg">${t('status.unreachable')}</div>`;
      }
    }

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target) && e.target !== btn) dropdown.classList.remove('open');
    });

    loadStatus();

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      setThemeCookie(next);
    });

    (function () {
      const discordBtn = document.getElementById('discord-btn');
      const discordToast = document.getElementById('discord-toast');
      let toastTimer = null;

      discordBtn.addEventListener('click', async () => {
        try { await navigator.clipboard.writeText('khaddict'); } catch { /* clipboard unavailable */ }
        discordBtn.classList.add('copied');
        discordToast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          discordToast.classList.remove('show');
          discordBtn.classList.remove('copied');
        }, 900);
      });
    })();
  </script>

  <script>
    function fmt(b) {
      if (b < 1024)              return b + ' B';
      if (b < 1024 * 1024)       return (b / 1024).toFixed(0) + ' KB';
      return (b / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function loadDir(label, path, fit) {
      const res   = await fetch(path);
      const items = await res.json();
      return {
        label,
        path,
        fit,
        files: items.filter(i => i.type === 'file').sort((a, b) => a.name.localeCompare(b.name))
      };
    }

    const lightbox          = document.getElementById('lightbox');
    const lightboxImg       = document.getElementById('lightbox-img');
    const lightboxCaption   = document.getElementById('lightbox-caption');
    const lightboxDownload  = document.getElementById('lightbox-download');
    const lightboxCopyBtn   = document.getElementById('lightbox-copy');
    const lightboxCopyToast = document.getElementById('lightbox-copy-toast');
    const lightboxCopyLinkBtn   = document.getElementById('lightbox-copy-link');
    const lightboxCopyLinkToast = document.getElementById('lightbox-copy-link-toast');

    let lightboxFiles = [];
    let lightboxIndex = 0;
    let lightboxPath  = '';

    function showLightboxItem() {
      const f   = lightboxFiles[lightboxIndex];
      const url = lightboxPath + f.name;
      lightboxImg.src = url;
      lightboxCaption.textContent = f.name + '  ·  ' + fmt(f.size);
      lightboxDownload.href = url;
      lightboxDownload.download = f.name;
    }

    function openLightbox(files, index, path) {
      lightboxFiles = files;
      lightboxIndex = index;
      lightboxPath  = path;
      showLightboxItem();
      lightbox.classList.add('open');
    }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxImg.src = '';
    }
    function lightboxStep(delta) {
      if (lightboxFiles.length < 2) return;
      lightboxIndex = (lightboxIndex + delta + lightboxFiles.length) % lightboxFiles.length;
      showLightboxItem();
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); lightboxStep(-1); });
    document.getElementById('lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); lightboxStep(1); });
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  lightboxStep(-1);
      if (e.key === 'ArrowRight') lightboxStep(1);
    });

    async function copyImageToClipboard(url) {
      const res  = await fetch(url);
      const blob = await res.blob();
      if (blob.type === 'image/png') {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        return;
      }
      // Non-PNG sources (jpg, webp...) aren't universally clipboard-writable,
      // so re-encode through a canvas to a PNG blob first.
      const bitmap = await createImageBitmap(blob);
      const canvas = document.createElement('canvas');
      canvas.width  = bitmap.width;
      canvas.height = bitmap.height;
      canvas.getContext('2d').drawImage(bitmap, 0, 0);
      const pngBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
      await navigator.clipboard.write([new ClipboardItem({ 'image/png': pngBlob })]);
    }

    let lightboxCopyTimer = null;
    lightboxCopyBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const f = lightboxFiles[lightboxIndex];
      try { await copyImageToClipboard(lightboxPath + f.name); } catch { /* clipboard unavailable */ }
      lightboxCopyBtn.classList.add('copied');
      lightboxCopyToast.classList.add('show');
      clearTimeout(lightboxCopyTimer);
      lightboxCopyTimer = setTimeout(() => {
        lightboxCopyToast.classList.remove('show');
        lightboxCopyBtn.classList.remove('copied');
      }, 900);
    });

    let lightboxCopyLinkTimer = null;
    lightboxCopyLinkBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const f = lightboxFiles[lightboxIndex];
      try { await navigator.clipboard.writeText(location.origin + lightboxPath + f.name); } catch { /* clipboard unavailable */ }
      lightboxCopyLinkBtn.classList.add('copied');
      lightboxCopyLinkToast.classList.add('show');
      clearTimeout(lightboxCopyLinkTimer);
      lightboxCopyLinkTimer = setTimeout(() => {
        lightboxCopyLinkToast.classList.remove('show');
        lightboxCopyLinkBtn.classList.remove('copied');
      }, 900);
    });

    function renderDock({ path, fit, files }) {
      const wrap = document.createElement('div');

      if (!files.length) {
        const empty = document.createElement('div');
        empty.className = 'dir-empty';
        empty.textContent = t('dir.empty');
        wrap.appendChild(empty);
        return wrap;
      }

      const dock = document.createElement('div');
      dock.className = 'dock';

      files.forEach((f, i) => {
        const link = path + f.name;
        const item = document.createElement('a');
        item.className = 'dock-item';
        item.href = link;
        item.target = '_blank';
        item.rel = 'noopener';
        item.innerHTML =
          '<img src="' + path + 'thumbs/' + f.name + '" loading="lazy" alt="" style="object-fit:' + fit + '">' +
          '<span class="dock-size">' + fmt(f.size) + '</span>' +
          '<span class="dock-tooltip">' + f.name + '</span>';
        item.addEventListener('click', (e) => {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          e.preventDefault();
          openLightbox(files, i, path);
        });
        dock.appendChild(item);
      });

      wrap.appendChild(dock);

      return wrap;
    }

    function renderGalleryGrid({ path, files }) {
      const wrap = document.createElement('div');

      if (!files.length) {
        const empty = document.createElement('div');
        empty.className = 'dir-empty';
        empty.textContent = t('dir.empty');
        wrap.appendChild(empty);
        return wrap;
      }

      const grid = document.createElement('div');
      grid.className = 'gallery-grid';

      files.forEach((f, i) => {
        const link = path + f.name;
        const card = document.createElement('a');
        card.className = 'gallery-card';
        card.href = link;
        card.target = '_blank';
        card.rel = 'noopener';
        card.innerHTML =
          '<div class="gallery-thumb">' +
            '<img src="' + path + 'thumbs/' + f.name + '" loading="lazy" alt="">' +
            '<span class="gallery-size">' + fmt(f.size) + '</span>' +
          '</div>';
        card.addEventListener('click', (e) => {
          if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
          e.preventDefault();
          openLightbox(files, i, path);
        });
        grid.appendChild(card);
      });

      wrap.appendChild(grid);

      return wrap;
    }

    async function init() {
      const tree = document.getElementById('tree');
      try {
        const dirs = await Promise.all([
          loadDir('tabs.icons',   '/icons/',   'contain'),
          loadDir('tabs.gallery', '/gallery/', 'cover')
        ]);

        const tabs   = document.createElement('div');
        tabs.className = 'tabs';
        const panels = document.createElement('div');

        dirs.forEach((d, i) => {
          const panel = document.createElement('div');
          panel.className = 'tab-panel' + (i === 0 ? ' active' : '');
          panel.appendChild(i === 0 ? renderDock(d) : renderGalleryGrid(d));
          panels.appendChild(panel);

          const tab = document.createElement('button');
          tab.className = 'tab' + (i === 0 ? ' active' : '');
          tab.type = 'button';
          tab.innerHTML = '<span data-i18n="' + d.label + '">' + t(d.label) + '</span> <span class="tab-count">' + d.files.length + '</span>';
          tab.addEventListener('click', () => {
            tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            panels.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            panel.classList.add('active');
          });
          tabs.appendChild(tab);
        });

        tree.appendChild(tabs);
        tree.appendChild(panels);
      } catch(e) {
        tree.innerHTML = `<div class="dir-empty">${t('dir.failed')}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
