<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    function getThemeCookie() {
      try {
        var match = document.cookie.match(/(?:^|; )khaddict-theme=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : null;
      } catch (e) { return null; }
    }
    function setThemeCookie(value) {
      try {
        document.cookie = 'khaddict-theme=' + encodeURIComponent(value) + '; domain=.khaddict.com; path=/; max-age=31536000; SameSite=Lax; Secure';
      } catch (e) { /* cookies unavailable */ }
    }
    (function () {
      var stored = getThemeCookie();
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <title>khaddict</title>
  <meta name="description" content="Personal space dedicated to homelab, self-hosted infrastructure and code." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://khaddict.com" />

  <meta property="og:description" content="Personal space dedicated to homelab, self-hosted infrastructure and code." />
  <meta property="og:image" content="https://images.khaddict.com/icons/khazix-pc.png" />
  <meta name="twitter:card" content="summary" />

  <meta name="twitter:image" content="https://images.khaddict.com/icons/khazix-pc.png" />
  <link rel="icon" href="https://images.khaddict.com/icons/khazix-pc.png" type="image/png" />

      g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);

  <style>
    :root {
      --bg:                 #ffffff;
      --text:               #18181b;
      --muted:              #71717a;
      --border:             rgba(24, 24, 27, .09);
      --accent:             #8b5cf6;
      --accent-2:           #c026d3;
      --up:                 #16a34a;
      --down:               #dc2626;
      --surface:            #ffffff;
      --surface-translucent: rgba(255, 255, 255, .5);
      --shadow:             rgba(24, 24, 27, .12);
      --blob-1:             rgba(139, 92, 246, .32);
      --blob-2:             rgba(192, 71, 219, .24);
      --danger-dim:         rgba(239, 68, 68, .10);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:                  #0b0b10;
        --text:                #f1f5f9;
        --muted:               #94949f;
        --border:              rgba(255, 255, 255, .1);
        --accent:              #a78bfa;
        --accent-2:            #e879f9;
        --up:                  #4ade80;
        --down:                #f87171;
        --surface:             #15151c;
        --surface-translucent: rgba(11, 11, 16, .5);
        --shadow:              rgba(0, 0, 0, .5);
        --blob-1:              rgba(139, 92, 246, .22);
        --blob-2:              rgba(192, 71, 219, .18);
        --danger-dim:          rgba(239, 68, 68, .16);
      }
    }

    :root[data-theme="light"] {
      --bg: #ffffff; --text: #18181b; --muted: #71717a; --border: rgba(24, 24, 27, .09);
      --accent: #8b5cf6; --accent-2: #c026d3; --up: #16a34a; --down: #dc2626;
      --surface: #ffffff; --surface-translucent: rgba(255, 255, 255, .5); --shadow: rgba(24, 24, 27, .12);
      --blob-1: rgba(139, 92, 246, .32); --blob-2: rgba(192, 71, 219, .24);
      --danger-dim: rgba(239, 68, 68, .10);
    }

    :root[data-theme="dark"] {
      --bg: #0b0b10; --text: #f1f5f9; --muted: #94949f; --border: rgba(255, 255, 255, .1);
      --accent: #a78bfa; --accent-2: #e879f9; --up: #4ade80; --down: #f87171;
      --surface: #15151c; --surface-translucent: rgba(11, 11, 16, .5); --shadow: rgba(0, 0, 0, .5);
      --blob-1: rgba(139, 92, 246, .22); --blob-2: rgba(192, 71, 219, .18);
      --danger-dim: rgba(239, 68, 68, .16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scrollbar-width: none; }
    html::-webkit-scrollbar { display: none; }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(620px circle at 12% -8%, var(--blob-1), transparent 60%),
        radial-gradient(520px circle at 100% 8%, var(--blob-2), transparent 55%),
        var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      transition: background-color .2s ease, color .2s ease;
    }

    /* top bar */
    .bandeau {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--border);
      background: var(--surface-translucent);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
      transition: background-color .2s ease, border-color .2s ease;
    }

    .bandeau-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: .85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .5rem;
      text-decoration: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: .92rem;
    }

    .brand-icon { width: 20px; height: 20px; border-radius: 4px; }

    .topnav {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      flex-wrap: wrap;
    }

    .topnav a, .topnav button, .status-nav button {
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      color: var(--muted);
      text-decoration: none;
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: color .15s ease;
      padding: 0;
    }
    .topnav a:hover, .topnav button:hover, .status-nav button:hover,
    .topnav a:focus-visible, .topnav button:focus-visible, .status-nav button:focus-visible { color: var(--accent); }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background .3s ease;
    }
    .dot.up   { background: var(--up); box-shadow: 0 0 0 0 rgba(22, 163, 74, .35); animation: pulse 2.5s infinite; }
    .dot.down { background: var(--down); }

    .bandeau-right {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .status-nav { position: relative; }

    .status-nav::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 0;
      width: 340px;
      height: .9rem;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + .9rem);
      right: 0;
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: .7rem .8rem .8rem;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }
    .dropdown.open,
    .status-nav:hover .dropdown { opacity: 1; transform: translateY(0); pointer-events: auto; }

    .dropdown-line {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      padding: .45rem 0;
    }
    .dropdown-line + .dropdown-line { border-top: 1px solid var(--border); }

    .dropdown-line-top {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      color: var(--muted);
    }
    .dropdown-name { flex: 1; color: var(--text); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

    .heartbeat {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
    }
    .heartbeat-bar {
      flex: 1;
      min-width: 2px;
      max-width: 5px;
      height: 100%;
      border-radius: 1px;
      background: var(--muted);
      opacity: .35;
    }
    .heartbeat-bar.up   { background: var(--up); opacity: 1; }
    .heartbeat-bar.down { background: var(--down); opacity: 1; }
    .heartbeat-bar.pending { background: #fbbf24; opacity: 1; }

    .dropdown-more {
      display: block;
      margin-top: .4rem;
      font-size: .74rem;
      color: var(--accent);
      text-decoration: none;
    }

    .footer-links {
      position: fixed;
      bottom: 1.25rem;
      right: 1.5rem;
      z-index: 15;
      display: flex;
      gap: .5rem;
    }

    .icon-link {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
      flex-shrink: 0;
    }
    .icon-link:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, .08); }
    .icon-link svg { width: 16px; height: 16px; }

    .copy-toast {
      position: absolute;
      bottom: calc(100% + .5rem);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: .35rem .65rem;
      border-radius: 6px;
      box-shadow: 0 8px 20px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hover-hint {
      position: absolute;
      bottom: calc(100% + .5rem);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: .7rem;
      padding: .3rem .6rem;
      border-radius: 6px;
      box-shadow: 0 8px 20px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity .15s ease, transform .15s ease;
    }
    .icon-link:hover .hover-hint { opacity: 1; transform: translateX(-50%) translateY(0); }
    .icon-link.copied .hover-hint { opacity: 0 !important; }

    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .theme-toggle:hover { color: var(--accent); border-color: var(--accent); background: rgba(139, 92, 246, .08); }
    .theme-toggle svg { width: 15px; height: 15px; }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

    .lang-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px; height: 30px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
      transition: border-color .15s ease;
    }
    .lang-toggle:hover { border-color: var(--accent); }
    .lang-toggle svg { width: 16px; height: 16px; border-radius: 50%; display: block; }
    .lang-toggle .flag-en { display: none; }

    /* hero */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      animation: fade-up .45s ease both;
    }

    .hero-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      max-width: 1180px;
      width: 100%;
    }

    .hero-copy { flex: 1 1 320px; text-align: left; }

    .hero h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 700;
      line-height: 1.4;
      max-width: 420px;
      letter-spacing: -.02em;
    }

    @media (max-width: 940px) {
      .hero-row { flex-direction: column; text-align: center; gap: 2rem; }
      .hero-copy { flex: none; text-align: center; max-width: 100%; }
      .hero h1 { max-width: 100%; margin: 0 auto; }
    }

    .hero .highlight {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      margin-top: .9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: .8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color .15s ease;
    }
    .repo-link:hover { color: var(--accent); }
    .repo-link svg { width: 14px; height: 14px; }

    /* deploy gag, relocated from the now-retired blog.khaddict.com */
    .deploy-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      padding: 1.75rem 2rem;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 20px 50px var(--shadow);
      flex: 1 1 620px;
      max-width: 720px;
      width: 100%;
      overflow: hidden;
      transition: background-color .2s ease, border-color .2s ease;
    }

    .deploy-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--down), transparent);
    }

    .deploy-panel::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--danger-dim), transparent 70%);
      pointer-events: none;
    }

    .deploy-label {
      position: relative;
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      font-weight: 600;
      color: var(--down);
      letter-spacing: .14em;
      text-transform: uppercase;
      opacity: .85;
    }

    .deploy-title { position: relative; font-size: 1.02rem; font-weight: 700; line-height: 1.5; }
    .deploy-title strong { color: var(--down); font-weight: 800; }

    .deploy-sub {
      position: relative;
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6;
      max-width: 620px;
      white-space: nowrap;
    }

    @media (max-width: 940px) {
      .deploy-panel { flex: none; }
      .deploy-sub { white-space: normal; max-width: 420px; }
    }

    .deploy-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .6rem 1.4rem;
      border-radius: 10px;
      border: 1px solid rgba(239, 68, 68, .35);
      background: rgba(239, 68, 68, .08);
      color: var(--down);
      font-family: 'JetBrains Mono', monospace;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .03em;
      cursor: pointer;
      transition: background .2s, border-color .2s, box-shadow .2s, transform .15s cubic-bezier(.34, 1.56, .64, 1);
    }

    .deploy-btn:hover:not(:disabled) {
      background: rgba(239, 68, 68, .16);
      border-color: rgba(239, 68, 68, .65);
      box-shadow: 0 0 24px rgba(239, 68, 68, .2);
      transform: translateY(-3px);
    }

    .deploy-btn.deploying {
      cursor: not-allowed;
      transform: none;
      animation: deploy-progress 16.85s linear forwards;
    }

    @keyframes deploy-progress {
      0%   { background: rgba(239, 68, 68, .10); border-color: rgba(239, 68, 68, .4);  color: #ef4444; }
      100% { background: rgba(34, 197, 94, .10); border-color: rgba(34, 197, 94, .45); color: #22c55e; }
    }

    .deploy-btn:disabled { opacity: .75; }

    .deploy-spinner {
      width: 13px; height: 13px;
      border: 2px solid var(--border);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confetti-burst .9s ease-out forwards;
    }

    @keyframes confetti-burst {
      to {
        transform: translate(var(--dx), calc(var(--dy) + 240px)) rotate(var(--rot));
        opacity: 0;
      }
    }

    #deploy-log {
      position: relative;
      display: none;
      width: calc(100% + 4rem);
      margin: .5rem -2rem -1.75rem;
      padding: .85rem 1.5rem 1.1rem;
      background: #0a0a0f;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      line-height: 1.8;
      text-align: left;
      white-space: pre-wrap;
      overflow-y: auto;
      overflow-x: hidden;
      user-select: none;
    }

    #deploy-log.open { display: flex; flex-direction: column; height: min(300px, 40dvh); }

    #deploy-log .la { color: var(--accent); }
    #deploy-log .lg { color: #4ade80; }
    #deploy-log .lm { color: #8a8a96; }

    #deploy-log::-webkit-scrollbar { width: 3px; }
    #deploy-log::-webkit-scrollbar-track { background: transparent; }
    #deploy-log::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, .12); border-radius: 2px; }
    #deploy-log::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, .22); }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0   rgba(22, 163, 74, .4); }
      70%  { box-shadow: 0 0 0 6px rgba(22, 163, 74, 0); }
      100% { box-shadow: 0 0 0 0   rgba(22, 163, 74, 0); }
    }

    @media (max-width: 460px) {
      .bandeau-inner { justify-content: center; text-align: center; }
      .topnav { justify-content: center; gap: 1rem; }
      .footer-links { position: static; align-self: center; margin: 2rem 0 1.5rem; }
      .status-nav { position: static; }
      .dropdown { left: 50%; right: auto; width: min(340px, calc(100vw - 2rem)); transform: translateX(-50%) translateY(-6px); }
      .dropdown.open, .status-nav:hover .dropdown { transform: translateX(-50%) translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

<body>
  <header class="bandeau">
    <div class="bandeau-inner">
      <a class="brand" href="/">
        <img class="brand-icon" src="https://images.khaddict.com/icons/khazix-pc.png" alt="" />
        khaddict
      </a>
      <nav class="topnav">
        <a href="https://khaddict.com" data-i18n="nav.home">home</a>
        <a href="https://blog.khaddict.com">blog</a>
        <a href="https://images.khaddict.com">images</a>
        <a href="https://dashboard.khaddict.com">dashboard</a>
      </nav>
      <div class="bandeau-right">
        <div class="status-nav">
          <button id="status-btn" type="button">
            <span class="dot" id="s-dot"></span><span data-i18n="status.label">status</span>
          </button>
          <div class="dropdown" id="s-dropdown">
            <div id="s-inner">
              <div class="dropdown-line" data-i18n="status.checking">checking systems…</div>
            </div>
          </div>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme" data-i18n-aria="theme.ariaLabel">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="lang-toggle" id="lang-toggle" type="button" aria-label="Switch language" data-i18n-aria="lang.ariaLabel">
          <svg class="flag-fr" viewBox="0 0 3 3" preserveAspectRatio="xMidYMid slice"><rect width="1" height="3" fill="#8FADD6"/><rect x="1" width="1" height="3" fill="#F7F6F2"/><rect x="2" width="1" height="3" fill="#E0958E"/></svg>
          <svg class="flag-en" viewBox="0 0 30 30" preserveAspectRatio="xMidYMid slice">

      try {
        var match = document.cookie.match(/(?:^|; )khaddict-lang=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : null;
      } catch (e) { return null; }
    }
    function setLangCookie(value) {
      try {
        document.cookie = 'khaddict-lang=' + encodeURIComponent(value) + '; domain=.khaddict.com; path=/; max-age=31536000; SameSite=Lax; Secure';
      } catch (e) { /* cookies unavailable */ }

      return (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
    }

      document.documentElement.lang = currentLang;

    const dot      = document.getElementById('s-dot');
    const dropdown = document.getElementById('s-dropdown');
    const inner    = document.getElementById('s-inner');
    const btn      = document.getElementById('status-btn');

    async function loadStatus() {
      try {
        const [pageRes, hbRes] = await Promise.all([
          fetch(`${STATUS}/api/status-page/${SLUG}`),
          fetch(`${STATUS}/api/status-page/heartbeat/${SLUG}`)
        ]);
        if (!pageRes.ok || !hbRes.ok) throw new Error();

        const page = await pageRes.json();
        const hb   = await hbRes.json();
        const monitors = page.publicGroupList.flatMap(g => g.monitorList);
        let up = 0;

        inner.innerHTML = '';
        monitors.forEach(m => {
          const beats = hb.heartbeatList[m.id] || [];
          const last  = beats[beats.length - 1];
          const isUp  = last?.status === 1;
          if (isUp) up++;

          const pct24 = hb.uptimeList[`${m.id}_24`];
          const p = pct24 !== undefined ? `${(pct24 * 100).toFixed(1)}%` : '—';

          const recent = beats.slice(-30);
          const bars = recent.map(b => {
            const state = b.status === 1 ? 'up' : b.status === 0 ? 'down' : b.status === 2 ? 'pending' : '';
            return `<span class="heartbeat-bar ${state}"></span>`;
          }).join('');

          const el = document.createElement('div');
          el.className = 'dropdown-line';
          el.innerHTML = `
            <div class="dropdown-line-top">
              <span class="dot ${isUp ? 'up' : 'down'}"></span>
              <span class="dropdown-name">${m.name}</span>
              <span>${p}</span>
            </div>
            <div class="heartbeat">${bars}</div>
          `;
          inner.appendChild(el);
        });

        const link = document.createElement('a');
        link.href = STATUS;
        link.target = '_blank';
        link.rel = 'noopener';
        link.className = 'dropdown-more';
        link.textContent = t('status.viewFull');
        inner.appendChild(link);

        const total = monitors.length;
        dot.className = `dot ${up === total ? 'up' : up === 0 ? 'down' : ''}`;

      } catch {
        inner.innerHTML = `<div class="dropdown-line">${t('status.unreachable')}</div>`;
      }

              const color = RAINBOW[Math.floor(Math.random() * RAINBOW.length)];

              wrap.style.color = color;
              lines.forEach(txt => {

                d.textContent = txt;

              awaitReturnAndCelebrate();

              wrap.style.color = '';

              const ctrlC = document.createElement('div');
              ctrlC.className = 'lm';
              ctrlC.textContent = '^C';
              deployLog.appendChild(ctrlC);

              const cmd = document.createElement('div');
              cmd.innerHTML = '<span class="la">$ cat ~/.gotcha</span>';
              deployLog.appendChild(cmd);

              const gotcha = document.createElement('div');
              gotcha.className = 'lg';
              gotcha.textContent = 'well played... by me. 🕺';
              deployLog.appendChild(gotcha);

              if (nearBottom) deployLog.scrollTop = deployLog.scrollHeight;
            };
            cancelHandler = (e) => {
              const isCtrlC = (e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C');
              if (!isCtrlC) return;
              e.preventDefault();
              stopParrot();
            };
            document.addEventListener('keydown', cancelHandler);
            deployLog.addEventListener('click', stopParrot);

      function awaitReturnAndCelebrate() {
        const onVisible = () => {
          if (document.visibilityState !== 'visible') return;
          document.removeEventListener('visibilitychange', onVisible);
          setTimeout(() => {
            deployBtn.innerHTML = `${t('deploy.deployed')} <span aria-hidden="true">✓</span>`;
            spawnConfetti(deployBtn);
          }, 1000);
        };
        document.addEventListener('visibilitychange', onVisible);
      }

      function spawnConfetti(anchor) {
        const rect = anchor.getBoundingClientRect();
        const originX = rect.left + rect.width / 2;
        const originY = rect.top + rect.height / 2;
        const colors = ['#8b5cf6', '#c026d3', '#4ade80', '#fbbf24', '#38bdf8'];

        const container = document.createElement('div');
        container.className = 'confetti-container';
        document.body.appendChild(container);

        for (let i = 0; i < 110; i++) {
          const piece = document.createElement('span');
          piece.className = 'confetti-piece';
          const angle = Math.random() * Math.PI * 2;
          const distance = 80 + Math.random() * 160;
          piece.style.left = originX + 'px';
          piece.style.top = originY + 'px';
          piece.style.background = colors[i % colors.length];
          piece.style.setProperty('--dx', (Math.cos(angle) * distance) + 'px');
          piece.style.setProperty('--dy', (Math.sin(angle) * distance - 60) + 'px');
          piece.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
          piece.style.animationDelay = (Math.random() * .15) + 's';
          container.appendChild(piece);
        }

        setTimeout(() => container.remove(), 1500);
      }

      deployBtn.addEventListener('click', deploy);

      window.addEventListener('pageshow', () => {
        fired = false;
        if (parrotInterval) clearInterval(parrotInterval);
        if (cancelHandler) document.removeEventListener('keydown', cancelHandler);
        if (stopParrot) deployLog.removeEventListener('click', stopParrot);
        deployBtn.disabled = false;
        deployBtn.classList.remove('deploying');
        deployBtn.textContent = t('deploy.button');
        deployLog.classList.remove('open');
        deployLog.innerHTML = '';
