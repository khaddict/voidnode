apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: coraza-waf
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
  wasm:
  - name: coraza
    rootID: coraza-root
    failOpen: false
    code:
      type: Image
      image:
        # renovate: depName=ghcr.io/corazawaf/coraza-proxy-wasm
        url: ghcr.io/corazawaf/coraza-proxy-wasm:0.6.0
    config:
      directives_map:
        default:
          - "Include @recommended-conf"
          # CRS embedded in the wasm image
          - "Include @crs-setup-conf"
          # PromQL aggregate functions (count, sum, avg) trigger SQL injection rules 942xxx. Exclude the query arg on the VM API (vmsingle only)
          - "SecRule REQUEST_URI \"@beginsWith /api/v1/\" \"id:106,phase:1,pass,nolog,chain\""
          - "SecRule REQUEST_HEADERS:Host \"@streq vmsingle.khaddict.lab\" \"ctl:ruleRemoveByTag=attack-sqli\""
          # Include CRS rules embedded in the wasm image
          - "Include @owasp_crs/*.conf"
          # Blocking mode
          - "SecRuleEngine On"
          # Debug log levels: https://www.feistyduck.com/library/modsecurity-handbook-free/online/ch04-logging.html
          - "SecDebugLogLevel 1"
      default_directives: default
      metric_labels:
        owner: coraza
        profile: recommended+crs-block
