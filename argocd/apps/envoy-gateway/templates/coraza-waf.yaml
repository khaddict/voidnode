apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: coraza-waf
  namespace: envoy-gateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
  wasm:
  - name: coraza
    rootID: coraza-root
    failOpen: false
    code:
      type: Image
      image:
        url: ghcr.io/corazawaf/coraza-proxy-wasm:latest
    config:
      directives_map:
        default:
          - "Include @recommended-conf"
          # CRS embedded in the wasm image
          - "Include @crs-setup-conf"
          # Exclusion WebSocket Uptime Kuma
          - "SecRule REQUEST_HEADERS:Host \"@streq uptimekuma.khaddict.lab\" \"id:102,phase:1,chain,allow,ctl:ruleEngine=Off\""
          - "SecRule REQUEST_URI \"@beginsWith /socket.io/\""
          # Targeted CRS exclusion for static JS false positive (sprintf.js triggers rule 933150)
          - "SecRule REQUEST_URI \"@beginsWith /static/js/\" \"id:105,phase:1,pass,nolog,ctl:ruleRemoveById=933150\""
          # Include CRS rules embedded in the wasm image
          - "Include @owasp_crs/*.conf"
          # Blocking mode
          - "SecRuleEngine On"
          # Debug log levels: https://www.feistyduck.com/library/modsecurity-handbook-free/online/ch04-logging.html
          - "SecDebugLogLevel 1"
      default_directives: default
      metric_labels:
        owner: coraza
        profile: recommended+crs-block
