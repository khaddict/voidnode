app: images-khaddict
namespace: images-khaddict

deployment:
  name: images-khaddict
  replicas: 1
  image: ghcr.io/khaddict/images-khaddict:de8b29e
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  name: images-khaddict
  type: ClusterIP
  port: 80
  targetPort: 80

probes:
  enabled: true
  liveness:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 5

httproute:
  host: images.khaddict.lab
  gatewayName: envoy-gateway
