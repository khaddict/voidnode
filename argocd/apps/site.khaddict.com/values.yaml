app: site-khaddict
namespace: site-khaddict

deployment:
  name: site-khaddict
  replicas: 3
  image: nginx:stable
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

service:
  name: site-khaddict
  type: ClusterIP
  port: 80
  targetPort: 80

secret:
  name: site-khaddict

httproute:
  host: site.khaddict.lab
  gatewayName: envoy-gateway
