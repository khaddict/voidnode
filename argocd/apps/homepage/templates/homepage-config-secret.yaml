apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: {{ .Values.config_secret.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "homepage.labels" . | nindent 4 }}
stringData:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Homepage | khaddict
    background:
      image: https://images.khaddict.com/gallery/voidnode-khazix-wallpaper.png
      opacity: 30
    favicon: https://images.khaddict.com/icons/khazix-pc.png
    language: en
    headerStyle: boxed
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: false
      showSearchSuggestions: true
      hideVisitURL: true
      provider: google
    hideVersion: true
    maxGroupColumns: 3
    useEqualHeights: true
    layout:
      Virtualization & Backups:
        columns: 2
      Infra & Orchestration:
        columns: 2
      Monitoring:
        columns: 3
      Network:
        columns: 3
      Inventory:
        columns: 2
      Observability:
        columns: 3
      AI:
        columns: 2
      Developer & Socials:
        columns: 2
  custom.css: |
    .service-icon img {
      width: 40px !important;
      height: 40px !important;
    }
    .service-card {
      background: rgba(15, 10, 35, 0.55) !important;
      backdrop-filter: blur(3px) !important;
      -webkit-backdrop-filter: blur(3px) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
    }
    .service-block {
      background: rgba(255, 255, 255, 0.04) !important;
    }
    #information-widgets {
      background: rgba(15, 10, 35, 0.55) !important;
      backdrop-filter: blur(3px) !important;
      -webkit-backdrop-filter: blur(3px) !important;
      border: 1px solid rgba(255, 255, 255, 0.07) !important;
      border-radius: 0.5rem !important;
    }
    .widget-container {
      background: transparent !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
  custom.js: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Virtualization & Backups:
        - Proxmox:
            icon: https://images.khaddict.com/icons/pve.png
            href: https://voidnode.khaddict.lab:8006
            description: voidnode.khaddict.lab
            widget:
              type: proxmox
              url: https://voidnode.khaddict.lab:8006
              username: api@pam!homepage
              password: {{ .Values.services.pve.password }}
              node: voidnode
        - Proxmox Backup Server:
            icon: https://images.khaddict.com/icons/pbs.png
            href: https://pbs.khaddict.lab:8007
            description: pbs.khaddict.lab
            widget:
              type: proxmoxbackupserver
              url: https://pbs.khaddict.lab:8007
              username: api-ro-user@pbs!homepage
              password: {{ .Values.services.pbs.password }}
    - Infra & Orchestration:
        - Saltmaster:
            icon: https://images.khaddict.com/icons/saltstack.png
            href: https://saltmaster.khaddict.lab:8000
            description: saltmaster.khaddict.lab
        - Stackstorm:
            icon: https://images.khaddict.com/icons/stackstorm.png
            href: https://stackstorm.khaddict.lab
            description: stackstorm.khaddict.lab
        - ArgoCD:
            icon: https://images.khaddict.com/icons/argocd.png
            href: https://argocd.khaddict.lab
            description: argocd.khaddict.lab
            widget:
              type: argocd
              url: https://argocd.khaddict.lab
              key: {{ .Values.services.argocd.password }}
        - Harbor:
            icon: https://images.khaddict.com/icons/harbor.png
            href: https://registry.khaddict.lab
            description: registry.khaddict.lab
        - Vault:
            icon: https://images.khaddict.com/icons/vault.png
            href: https://vault.khaddict.lab:8200
            description: vault.khaddict.lab
    - Monitoring:
        - Prometheus:
            icon: https://images.khaddict.com/icons/prometheus.png
            href: http://prometheus.khaddict.lab:9090
            description: prometheus.khaddict.lab
            widget:
              type: prometheus
              url: http://prometheus.khaddict.lab:9090
        - Victoria Metrics:
            icon: https://images.khaddict.com/icons/victoria-metrics.png
            href: https://vmsingle.khaddict.lab
            description: vmsingle.khaddict.lab
            widget:
              type: prometheus
              url: http://vmagent-vm.victoria-metrics.svc.cluster.local:8429
        - Alert Manager:
            icon: https://images.khaddict.com/icons/alertmanager.png
            href: http://alertmanager.khaddict.lab:9093
            description: alertmanager.khaddict.lab
        - Grafana:
            icon: https://images.khaddict.com/icons/grafana.png
            href: https://grafana.khaddict.lab:3000
            description: grafana.khaddict.lab
            widget:
              type: grafana
              version: 2
              url: https://grafana.khaddict.lab:3000
              username: admin
              password: {{ .Values.services.grafana.password }}
    - Network:
        - OPNsense:
            icon: https://images.khaddict.com/icons/opnsense.png
            href: https://opnsense.khaddict.lab
            description: opnsense.khaddict.lab
            widget:
              type: opnsense
              url: https://opnsense.khaddict.lab
              username: {{ .Values.services.opnsense.username }}
              password: {{ .Values.services.opnsense.password }}
              wan: opt1
        - TP-Link:
            icon: https://images.khaddict.com/icons/tplink.png
            href: http://tplink.khaddict.lab
            description: tplink.khaddict.lab
        - Freebox:
            icon: https://images.khaddict.com/icons/freebox.png
            href: http://mafreebox.freebox.fr
            description: mafreebox.freebox.fr
    - Inventory:
        - NetBox:
            icon: https://images.khaddict.com/icons/netbox.png
            href: https://netbox.khaddict.lab
            description: netbox.khaddict.lab
        - Homelable:
            icon: https://images.khaddict.com/icons/homelable.png
            href: http://homelable.khaddict.lab:3000
            description: homelable.khaddict.lab
    - Observability:
        - ChangeDetection.io:
            icon: https://images.khaddict.com/icons/changedetection.png
            href: http://changedetection.khaddict.lab
            description: changedetection.khaddict.lab
            widget:
              type: changedetectionio
              url: http://changedetection.khaddict.lab
              key: {{ .Values.services.changedetection.password }}
        - Uptime Kuma:
            icon: https://images.khaddict.com/icons/uptimekuma.png
            href: https://status.khaddict.com
            description: status.khaddict.com
            widget:
              type: uptimekuma
              url: https://status.khaddict.com
              slug: khaddict
        - Matomo:
            icon: https://images.khaddict.com/icons/matomo.png
            href: https://matomo.khaddict.com
            description: matomo.khaddict.com
    - AI:
        - Ollama:
            icon: https://images.khaddict.com/icons/ollama.png
            href: http://ollama.khaddict.lab:11434
            description: ollama.khaddict.lab
        - Open WebUI:
            icon: https://images.khaddict.com/icons/openwebui.png
            href: http://openwebui.khaddict.lab:8080
            description: openwebui.khaddict.lab
    - Developer & Socials:
        - Github:
            icon: https://images.khaddict.com/icons/github.png
            href: https://github.com/khaddict
            description: khaddict
        - khaddict.com:
            icon: https://images.khaddict.com/icons/khazix-pc-2.png
            href: https://khaddict.com
            description: khaddict.com
        - Discord:
            icon: https://images.khaddict.com/icons/discord.png
            description: khaddict
        - Reddit:
            icon: https://images.khaddict.com/icons/reddit.png
            href: https://www.reddit.com/user/khadddict/
            description: khadddict
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        cpu: true
        memory: true
        uptime: true
        refresh: 3000
        network: true
    - search:
        provider: google
        showSearchSuggestions: true
        target: _blank
    - openmeteo:
        label: Paris
        latitude: 48.866667
        longitude: 2.333333
        timezone: Europe/Paris
        units: metric
        cache: 5
  docker.yaml: ""
