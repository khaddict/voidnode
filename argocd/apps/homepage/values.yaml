app: homepage
namespace: homepage

deployment:
  replicas: 1
  image: ghcr.io/gethomepage/homepage:v1.13.2
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

service:
  name: homepage
  type: ClusterIP
  port: 3000
  targetPort: http
  protocol: TCP

probes:
  enabled: true
  liveness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5

secret:
  name: homepage

service_account:
  name: homepage

config_secret:
  name: homepage-config

cluster_role:
  name: homepage

cluster_role_binding:
  name: homepage

httproute:
  host: homepage.khaddict.lab
  gatewayName: envoy-gateway

services:
  pve:
    password: <path:kv/data/kubernetes/homepage#pve_token>
  argocd:
    password: <path:kv/data/kubernetes/homepage#argocd_token>
  pbs:
    password: <path:kv/data/kubernetes/homepage#pbs_token>
  changedetection:
    password: <path:kv/data/kubernetes/homepage#changedetection_token>
  grafana:
    password: <path:kv/data/kubernetes/homepage#grafana_password>
  opnsense:
    password: <path:kv/data/kubernetes/homepage#opnsense_password>
    username: <path:kv/data/kubernetes/homepage#opnsense_username>
