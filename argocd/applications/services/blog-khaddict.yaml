apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-khaddict
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: voidnode
    app.kubernetes.io/component: service
  annotations:
    owner: platform
    repo: khaddict/voidnode
spec:
  project: default
  source:
    repoURL: https://github.com/khaddict/voidnode.git
    targetRevision: main
    path: argocd/apps/blog.khaddict.com
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: blog-khaddict
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
