apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: site-khaddict
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/khaddict/voidnode.git
    targetRevision: HEAD
    path: argocd/apps/site.khaddict.com
    plugin:
      name: argocd-vault-plugin-helm
      env:
        - name: HELM_ARGS
          value: -f values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: site-khaddict
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
